name: Auto-merge on CI success

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed

jobs:
  automerge:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Find PRs associated with the workflow run
        id: find_prs
        uses: actions/github-script@v7
        with:
          script: |
            const run = context.payload.workflow_run;
            const headSha = run.head_sha;
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            const { data: prs } = await github.rest.repos.listPullRequestsAssociatedWithCommit({
              owner,
              repo,
              commit_sha: headSha,
            });

            core.setOutput('pr_numbers', prs.map(p => p.number).join(','));
            return prs.map(p => ({ number: p.number, base: p.base.ref, labels: p.labels.map(l => l.name) }));

      - name: Auto-merge PRs targeting main with label 'automerge'
        uses: actions/github-script@v7
        with:
          script: |
            const prNumbersRaw = core.getInput('pr_numbers') || process.env.PR_NUMBERS || '';
            const prNumbers = prNumbersRaw.split(',').filter(Boolean).map(n => parseInt(n, 10));

            for (const prNumber of prNumbers) {
              const { data: pr } = await github.rest.pulls.get({ owner: context.repo.owner, repo: context.repo.repo, pull_number: prNumber });

              if (pr.base.ref !== 'main') {
                console.log(`Skipping PR #${prNumber} — base is ${pr.base.ref}`);
                continue;
              }

              const labels = pr.labels.map(l => (typeof l === 'string' ? l : l.name));
              if (!labels.includes('automerge')) {
                console.log(`Skipping PR #${prNumber} — missing 'automerge' label`);
                continue;
              }

              try {
                await github.rest.pulls.merge({ owner: context.repo.owner, repo: context.repo.repo, pull_number: prNumber, merge_method: 'squash' });
                console.log(`Merged PR #${prNumber}`);
              } catch (err) {
                console.error(`Failed to merge PR #${prNumber}: ${err}`);
                core.setFailed(`Failed to merge PR #${prNumber}: ${err}`);
              }
            }
        env:
          PR_NUMBERS: ${{ steps.find_prs.outputs.pr_numbers }}
