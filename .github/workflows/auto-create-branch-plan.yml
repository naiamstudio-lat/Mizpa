name: Auto-create Branch Plan

on:
  pull_request:
    types: [opened, edited, reopened, synchronize]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  create-plan-if-missing:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Auto-create branch plan if missing
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            if (!pr) return;

            const branch = pr.head.ref;
            const headRepo = pr.head.repo;
            const headOwner = headRepo.owner.login;
            const headRepoName = headRepo.name;
            const baseFull = `${context.repo.owner}/${context.repo.repo}`;
            const headFull = headRepo.full_name;
            const candidates = [
              `docs/branches/${branch}.md`,
              `docs/branches/${branch.replace(/\//g, '-')}.md`,
            ];

            // check if any candidate exists in base repo
            let existsInBase = false;
            let existingPath = null;
            for (const p of candidates) {
              try {
                await github.rest.repos.getContent({ owner: context.repo.owner, repo: context.repo.repo, path: p });
                existsInBase = true;
                existingPath = p;
                break;
              } catch (e) {
                // not found
              }
            }

            if (existsInBase) {
              // nothing to do; just ensure PR body/link/label
              const fileUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/blob/${pr.base.ref}/${existingPath}`;
              if (!pr.body || !pr.body.includes(existingPath)) {
                const newBody = (pr.body || '') + `\n\n**Branch plan:** ${fileUrl}`;
                await github.rest.pulls.update({ owner: context.repo.owner, repo: context.repo.repo, pull_number: pr.number, body: newBody });
              }
              await github.rest.issues.addLabels({ owner: context.repo.owner, repo: context.repo.repo, issue_number: pr.number, labels: ['has-branch-plan'] }).catch(()=>{});
              return;
            }

            // If not exists, attempt to create in the PR head branch only if it's the same repo
            const targetPath = `docs/branches/${branch}.md`;
            const templatePath = 'docs/branches/BRANCH_TEMPLATE.md';

            if (headFull === baseFull) {
              // read template from checked out files
              const fs = require('fs');
              let template = 'Feat: ' + branch + '\n\n(Template not found)';
              try {
                template = fs.readFileSync(templatePath, 'utf8');
              } catch (e) {
                // fallback: small default template
              }

              const content = template.replace(/feat\/describe-branch-name-here/g, branch).replace(/Feat: freestyle-backup/, `Feat: ${branch}`);
              const encoded = Buffer.from(content).toString('base64');

              try {
                await github.rest.repos.createOrUpdateFileContents({
                  owner: headOwner,
                  repo: headRepoName,
                  path: targetPath,
                  message: `chore: add branch plan for ${branch}`,
                  content: encoded,
                  branch: branch,
                });

                const fileUrl = `https://github.com/${headFull}/blob/${branch}/${targetPath}`;
                // update PR body and label
                if (!pr.body || !pr.body.includes(targetPath)) {
                  const newBody = (pr.body || '') + `\n\n**Branch plan:** ${fileUrl}`;
                  await github.rest.pulls.update({ owner: context.repo.owner, repo: context.repo.repo, pull_number: pr.number, body: newBody });
                }
                await github.rest.issues.addLabels({ owner: context.repo.owner, repo: context.repo.repo, issue_number: pr.number, labels: ['has-branch-plan'] }).catch(()=>{});
              } catch (err) {
                // If create fails for any reason, comment to inform
                await github.rest.issues.createComment({ owner: context.repo.owner, repo: context.repo.repo, issue_number: pr.number, body: `I attempted to create \`${targetPath}\` on branch \`${branch}\` but couldn't: ${err.message}. Please add a branch plan under \`docs/branches/\` or allow the workflow permissions to push.` });
              }
            } else {
              // head is a fork — cannot push; ask contributor to add plan or maintainers to create it
              await github.rest.issues.createComment({ owner: context.repo.owner, repo: context.repo.repo, issue_number: pr.number, body: `I couldn't create a branch plan automatically because the PR branch is on a fork. Please add a branch plan under \`docs/branches/${branch}.md\` in your branch, or ask a maintainer to create it in the target repo.` });
            }