name: CI

on:
  pull_request:
    branches:
      - main
      - develop
  push:
    branches:
      - main
      - develop

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      CI: true
      VITE_SUPABASE_URL: https://hnpdebnkumcizmrngayc.supabase.co
      VITE_SUPABASE_ANON_KEY: sb_publishable_wadnS4uB2PYPECVgNuBe9w_mXQJ8Ctr

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Chromium for Puppeteer
        run: |
          sudo apt-get update
          sudo apt-get install -y chromium-browser

      - name: Run TypeScript build
        run: npm run build

      - name: Run E2E suite
        run: npm run test:e2e
