name: CI

on:
  pull_request:
    branches:
      - main
      - develop
  push:
    branches:
      - main
      - develop

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      CI: true
      VITE_SUPABASE_URL: https://hnpdebnkumcizmrngayc.supabase.co
      VITE_SUPABASE_ANON_KEY: sb_publishable_wadnS4uB2PYPECVgNuBe9w_mXQJ8Ctr

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run TypeScript build
        run: npm run build

      - name: Start preview server
        run: |
          npm run preview -- --host 0.0.0.0 --port 5173 --strictPort > /tmp/preview.log 2>&1 &
          echo $! > /tmp/preview.pid
          for i in $(seq 1 30); do
            if curl -sSf http://127.0.0.1:5173 >/dev/null; then
              echo "server ready"
              exit 0
            fi
            sleep 2
          done
          echo "Preview server failed to start"
          cat /tmp/preview.log
          exit 1

      - name: Run E2E suite
        run: |
          export BASE_URL=http://127.0.0.1:5173
          export PUPPETE_EXECUTABLE_PATH=$(command -v chromium || command -v google-chrome-stable || command -v chromium-browser || true)
          npm run test:e2e

      - name: Stop preview server
        if: always()
        run: kill "$(cat /tmp/preview.pid)" || true
