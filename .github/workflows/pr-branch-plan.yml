name: PR Branch Plan Helper

on:
  pull_request:
    types: [opened, edited, reopened, synchronize]

jobs:
  attach-branch-plan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure branch plan is linked and label PR
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            if (!pr) return;
            const branch = pr.head.ref;
            const repo = context.repo;

            // Candidate filenames
            const candidates = [
              `docs/branches/${branch}.md`,
              `docs/branches/${branch.replace(/\//g, '-')}.md`,
            ];

            let found = null;
            for (const f of candidates) {
              try {
                await github.rest.repos.getContent({ owner: repo.owner, repo: repo.repo, path: f });
                found = f;
                break;
              } catch (e) {
                // not found
              }
            }

            const prNumber = pr.number;
            if (found) {
              const fileUrl = `https://github.com/${repo.owner}/${repo.repo}/blob/${pr.base.ref}/${found}`;
              const linkText = `\n\n**Branch plan:** ${fileUrl}`;

              // Update PR body if link not present
              if (!pr.body || !pr.body.includes(found)) {
                const newBody = (pr.body || '') + linkText;
                await github.rest.pulls.update({ owner: repo.owner, repo: repo.repo, pull_number: prNumber, body: newBody });
              }

              // Add label
              const label = 'has-branch-plan';
              try {
                await github.rest.issues.addLabels({ owner: repo.owner, repo: repo.repo, issue_number: prNumber, labels: [label] });
              } catch (err) {
                // ignore
              }
            } else {
              // Post a gentle comment reminding to add branch plan
              const commentBody = `Hi! I couldn't find a branch plan under \`docs/branches/${branch}.md\` or the dashed equivalent. If this work has a branch plan, please add it to \`docs/branches/\` and link it in the PR description. If not needed, ignore this message.`;
              await github.rest.issues.createComment({ owner: repo.owner, repo: repo.repo, issue_number: prNumber, body: commentBody });
            }